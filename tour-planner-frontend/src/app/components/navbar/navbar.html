<div class="flex flex-col w-15 h-full p-2 rounded-lg bg-sidebar border border-sidebar-border opacity-85">
  @for (item of navItems; track item.state) {
    <app-nav-button
      [icon]="item.icon"
      [label]="item.label"
      [state]="item.state"
      [isActive]="activeState() === item.state"
      (stateChange)="onStateChange($event)"
    />
  }
</div>
