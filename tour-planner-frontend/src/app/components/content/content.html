<div class="flex flex-col h-full p-2 rounded-lg bg-sidebar border border-sidebar-border opacity-85">
  @switch (activeState) {
    @case ('overview') { <p>Overview</p> }
    @case ('details')  { <p>Details</p> }
    @case ('edit')     { <p>Edit</p> }
    @case ('logs')     { <p>Logs</p> }
    @case ('user')     { <p>Account</p> }
    @default           { <ng-content /> }
  }
</div>
